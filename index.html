<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Quirky Fortune</title>
  <meta name="description" content="A playful daily fortune app." />
  <meta name="theme-color" content="#3A8FE8" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="assets/favicon.png" />
  <link rel="apple-touch-icon" href="assets/icon.png" />
  <style>
    :root {
      --sky-top: #5bb3ff;
      --sky-bottom: #3a8fe8;
      --sky-deep: #2b7fd4;
      --white: #fff;
      --text: #1a1a1a;
      --secondary: #8e8e93;
      --muted: #aeaeb2;
      --bubble: #f2f2f7;
      --glass: rgba(255,255,255,.22);
      --glass-active: rgba(255,255,255,.35);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; font-family: Inter, ui-rounded, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: var(--text); }
    body {
      min-height: 100dvh;
      background: linear-gradient(180deg, var(--sky-top), var(--sky-bottom) 58%, var(--sky-deep));
      overflow-x: hidden;
    }
    body::before, body::after {
      content: ""; position: fixed; inset: auto; border-radius: 999px; background: rgba(255,255,255,.16); filter: blur(2px); pointer-events: none;
    }
    body::before { width: 280px; height: 280px; left: -120px; top: 12%; }
    body::after { width: 360px; height: 360px; right: -180px; bottom: 8%; }
    .app { min-height: 100dvh; padding: max(20px, env(safe-area-inset-top)) 20px calc(112px + env(safe-area-inset-bottom)); max-width: 560px; margin: 0 auto; position: relative; }
    .header { display: flex; justify-content: center; align-items: center; gap: 12px; color: white; margin: 10px 0 34px; }
    .flower { width: 30px; height: 30px; position: relative; display: inline-block; }
    .flower span { position: absolute; width: 11px; height: 11px; border-radius: 50%; background: white; opacity: .95; }
    .flower span:nth-child(1) { left: 9px; top: 0; } .flower span:nth-child(2) { right: 0; top: 9px; } .flower span:nth-child(3) { left: 9px; bottom: 0; } .flower span:nth-child(4) { left: 0; top: 9px; } .flower span:nth-child(5) { left: 11px; top: 11px; width: 8px; height: 8px; }
    h1 { font-size: 26px; margin: 0; letter-spacing: -.02em; }
    .screen { display: none; } .screen.active { display: block; }
    .card { background: white; border-radius: 30px; padding: 24px; box-shadow: 0 24px 60px rgba(18, 76, 130, .22); }
    .row { display: flex; justify-content: space-between; align-items: center; gap: 14px; }
    .date { color: var(--secondary); font-size: 14px; }
    .pill { color: var(--secondary); background: var(--bubble); border-radius: 999px; padding: 6px 12px; font-size: 12px; font-weight: 700; }
    .fortune { font-size: 28px; line-height: 1.32; font-weight: 650; margin: 24px 0 28px; letter-spacing: -.03em; }
    .actions { display: flex; justify-content: space-between; align-items: center; }
    .action-group { display: flex; gap: 10px; }
    button { border: 0; font: inherit; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .icon-button { width: 44px; height: 44px; border-radius: 16px; background: var(--bubble); display: grid; place-items: center; font-size: 19px; }
    .icon-button:disabled { opacity: .45; cursor: default; }
    .reply { margin-top: 24px; color: white; font-weight: 700; }
    .bubble { margin-top: 10px; background: var(--bubble); padding: 18px 20px; border-radius: 22px; font-size: 16px; line-height: 1.5; position: relative; font-weight: 500; color: var(--text); }
    .bubble::after { content: ""; width: 18px; height: 18px; background: var(--bubble); position: absolute; left: 28px; bottom: -8px; border-bottom-left-radius: 18px; transform: rotate(45deg); }
    .prompts { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 22px; }
    .prompt { min-height: 98px; border-radius: 24px; background: white; padding: 18px; text-align: left; font-weight: 700; line-height: 1.25; box-shadow: 0 16px 36px rgba(18, 76, 130, .15); }
    .profile { text-align: center; color: white; padding-top: 48px; }
    .avatar-ring { width: 124px; height: 124px; border-radius: 999px; border: 3px solid rgba(255,255,255,.55); padding: 4px; margin: 0 auto 18px; }
    .avatar { width: 100%; height: 100%; border-radius: inherit; object-fit: cover; background: rgba(255,255,255,.3); }
    .profile h2 { font-size: 30px; margin: 0 0 18px; }
    .profile-tools { display: grid; gap: 12px; width: min(320px, 100%); margin: 0 auto 16px; }
    .profile-field { width: 100%; height: 52px; border: 0; outline: 0; border-radius: 18px; padding: 0 16px; font: inherit; font-weight: 700; color: var(--text); background: rgba(255,255,255,.9); text-align: center; }
    .file-input { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0 0 0 0); clip-path: inset(50%); white-space: nowrap; }
    .profile-button-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .profile-button { height: 48px; border-radius: 16px; background: rgba(255,255,255,.25); color: white; font-weight: 750; display: grid; place-items: center; }
    .profile-note { margin: -4px 0 2px; color: rgba(255,255,255,.78); font-size: 12px; line-height: 1.35; }
    .history-button { min-width: 220px; height: 54px; border-radius: 18px; background: rgba(255,255,255,.25); color: white; font-weight: 750; }
    .tabs { position: fixed; left: 50%; transform: translateX(-50%); bottom: max(24px, env(safe-area-inset-bottom)); width: min(360px, calc(100vw - 96px)); height: 64px; border-radius: 32px; background: var(--glass); display: flex; align-items: center; justify-content: space-around; z-index: 10; backdrop-filter: blur(18px); }
    .tab { color: white; background: transparent; border-radius: 24px; padding: 9px 18px; min-width: 92px; font-size: 12px; font-weight: 700; display: grid; gap: 2px; justify-items: center; }
    .tab.active { background: var(--glass-active); }
    .modal { position: fixed; inset: 0; background: linear-gradient(180deg, var(--sky-top), var(--sky-bottom) 58%, var(--sky-deep)); padding: max(22px, env(safe-area-inset-top)) 20px max(22px, env(safe-area-inset-bottom)); z-index: 20; display: none; overflow: auto; }
    .modal.active { display: block; }
    .modal-inner { max-width: 560px; margin: 0 auto; min-height: 100%; display: flex; flex-direction: column; justify-content: flex-end; }
    .sheet { background: white; border-radius: 30px 30px 0 0; padding: 12px 20px 22px; max-height: 78dvh; overflow: auto; }
    .handle { width: 44px; height: 5px; border-radius: 999px; background: #d1d1d6; margin: 0 auto 18px; }
    .sheet h2 { margin: 0 0 18px; }
    .history-item { padding: 15px 0; border-bottom: 1px solid #eee; }
    .history-item strong { display: block; color: var(--secondary); font-size: 13px; margin-bottom: 5px; }
    .close, .primary { width: 100%; border-radius: 18px; height: 52px; margin-top: 16px; font-weight: 750; }
    .close { background: var(--bubble); color: var(--text); }
    .primary { background: var(--sky-bottom); color: white; }
    .counter { color: var(--secondary); font-size: 14px; font-weight: 700; }
    textarea { width: 100%; min-height: 104px; resize: vertical; border: 0; outline: 0; background: var(--bubble); border-radius: 22px; padding: 16px; margin-top: 16px; font: inherit; }
    .toast { position: fixed; left: 20px; right: 20px; bottom: 104px; max-width: 520px; margin: auto; border-radius: 18px; background: rgba(26,26,26,.88); color: white; padding: 14px 16px; text-align: center; opacity: 0; pointer-events: none; transform: translateY(12px); transition: .25s ease; z-index: 40; }
    .toast.show { opacity: 1; transform: translateY(0); }
    @media (max-width: 420px) { .app { padding-left: 16px; padding-right: 16px; } .fortune { font-size: 24px; } .prompts { grid-template-columns: 1fr; } .tabs { width: min(320px, calc(100vw - 56px)); } }
  </style>
</head>
<body>
  <main class="app">
    <section id="home" class="screen active">
      <div class="header"><span class="flower"><span></span><span></span><span></span><span></span><span></span></span><h1 id="greeting">Good morning</h1></div>
      <article class="card">
        <div class="row"><span id="date" class="date"></span><span id="tone" class="pill"></span></div>
        <div id="fortune" class="fortune">Reading the stars…</div>
        <div class="actions">
          <div class="action-group">
            <button class="icon-button" id="openChat" aria-label="Ask a question">✨</button>
            <button class="icon-button" id="refresh" aria-label="Refresh fortune">↻</button>
            <button class="icon-button" id="share" aria-label="Share fortune">💬</button>
          </div>
          <button class="icon-button" id="download" aria-label="Download image">🖼️</button>
        </div>
      </article>
      <div id="latestWrap" style="display:none"><div class="reply">Latest insight</div><div id="latestReply" class="bubble"></div></div>
      <div class="prompts" id="promptGrid"></div>
    </section>
    <section id="profile" class="screen">
      <div class="profile">
        <div class="avatar-ring"><img id="avatar" class="avatar" alt="Profile avatar"></div>
        <h2 id="profileNameTitle">User</h2>
        <div class="profile-tools" aria-label="Profile settings">
          <input id="profileNameInput" class="profile-field" type="text" maxlength="32" placeholder="Your name" autocomplete="name">
          <div class="profile-button-row">
            <label class="profile-button" for="profilePhotoInput">Change photo</label>
            <button class="profile-button" id="resetProfilePhoto" type="button">Reset photo</button>
          </div>
          <input id="profilePhotoInput" class="file-input" type="file" accept="image/*">
          <p class="profile-note">Your name and picture are saved only on this device.</p>
        </div>
        <button class="history-button" id="historyBtn">⏱ History</button>
      </div>
    </section>
  </main>
  <nav class="tabs" aria-label="Main navigation"><button class="tab active" data-screen="home"><span>⌂</span><span>Home</span></button><button class="tab" data-screen="profile"><span>♡</span><span>Profile</span></button></nav>
  <section id="chatModal" class="modal"><div class="modal-inner"><div class="header"><span class="flower"><span></span><span></span><span></span><span></span><span></span></span><h1 id="modalGreeting">Good evening</h1></div><div class="sheet"><div class="handle"></div><p id="counter" class="counter"></p><div id="chatReply" class="bubble">Ask me anything — I mix cosmic wisdom with questionable jokes.</div><div class="prompts" id="modalPrompts"></div><textarea id="question" placeholder="Ask your fortune…"></textarea><button class="primary" id="askBtn">Ask</button><button class="close" data-close="chatModal">Close</button></div></div></section>
  <section id="historyModal" class="modal"><div class="modal-inner"><div class="sheet"><div class="handle"></div><h2>Fortune History</h2><div id="historyList"></div><button class="close" data-close="historyModal">Close</button></div></div></section>
  <div id="toast" class="toast"></div>
  <script>
    const dailyFortunes = [
      ['The moon tugs gently at your heart, whispering secrets only the night sky can reveal.', 'Earnest'],
      ['Your coffee knows things about you that you have not admitted to yourself yet.', 'Playful'],
      ['A quiet moment today may unlock a truth you have been circling for weeks. Also, check your pockets — you left something important there.', 'Mixed'],
      ['You might feel a deep emotional pull that encourages you to explore your feelings. Surrounding yourself with supportive friends can help you grow.', 'Earnest'],
      ['The universe suggests you stop refreshing your inbox and start refreshing your soul. Same energy, better results.', 'Playful'],
      ['Patience is your ally today. The answer you seek is already forming — much like that load of laundry you forgot about.', 'Mixed'],
      ['Trust the small signs around you. A stranger’s smile, a song on the radio, or a pigeon making direct eye contact may hold meaning.', 'Mixed'],
      ['Your intuition is unusually sharp today. Use it wisely, and maybe do not trust anyone who says “trust me.”', 'Mixed'],
      ['Something you have been avoiding will demand attention. Meet it with courage — and perhaps a snack.', 'Mixed'],
      ['The stars align in your favor, especially if your plan involves staying in and being magnificent.', 'Playful'],
      ['Let go of what no longer serves you. This includes that group chat you mute but never leave.', 'Playful'],
      ['A creative spark waits within you. Feed it with curiosity, rest, and at least one unreasonable amount of optimism.', 'Earnest'],
      ['Today favors bold honesty. Speak your truth gently, unless someone asks “does this look good?” — then lie kindly.', 'Playful'],
      ['You are closer to a breakthrough than you realize. The finish line is nearer than your to-do list suggests.', 'Earnest'],
      ['Balance is key: ambition in the morning, snacks in the afternoon, existential wonder after 9 p.m.', 'Playful']
    ];
    const followUps = [
      'You might feel a deep emotional pull or inspiration that encourages you to explore your feelings and thoughts. Surrounding yourself with supportive friends or quiet moments can help you uncover insights about yourself that lead to personal growth.',
      'The night reveals what daylight politely ignores: your unspoken wishes, your half-finished dreams, and the location of every snack you hid from yourself.',
      'Listen to your heart, but verify with your calendar. Passion is wonderful; double-booking is not.',
      'Your question carries more wisdom than you think. Sit with it. Breathe. Then maybe write it down before you forget and blame the moon again.',
      'The path ahead asks for gentleness with yourself. Progress rarely arrives wearing a cape — sometimes it arrives wearing sweatpants.',
      'A hidden opportunity is closer than it appears. It may be disguised as an awkward conversation you have been postponing.',
      'Cosmic guidance says: yes, but also hydrate. The spirits are unanimous on this one.',
      'What you seek is seeking you too — probably in the junk drawer, emotionally speaking.'
    ];
    const prompts = ['What secrets might the night reveal?', 'How can I listen to my heart?', 'Will today surprise me?', 'What should I let go of?', 'Is the universe joking with me?', 'What is my hidden strength today?'];
    const $ = s => document.querySelector(s);
    const today = () => new Date().toISOString().slice(0,10);
    const hash = value => Math.abs([...value].reduce((h, ch) => ((h << 5) - h + ch.charCodeAt(0)) | 0, 0));
    const get = (key, fallback) => JSON.parse(localStorage.getItem(key) || JSON.stringify(fallback));
    const set = (key, value) => localStorage.setItem(key, JSON.stringify(value));
    let instance = localStorage.getItem('qf-instance');
    if (!instance) { instance = Date.now().toString(36) + '-' + Math.random().toString(36).slice(2,10); localStorage.setItem('qf-instance', instance); }
    function greeting() { const h = new Date().getHours(); return h < 12 ? 'Good morning' : h < 17 ? 'Good afternoon' : h < 21 ? 'Good evening' : 'Good night'; }
    function formatDate(key) { const [y,m,d] = key.split('-').map(Number); return new Date(y, m - 1, d).toLocaleDateString('en-GB', { day: 'numeric', month: 'long' }); }
    function formatHistoryDate(key) { const [y,m,d] = key.split('-').map(Number); return new Date(y, m - 1, d).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }); }
    function dailyState() { const state = get('qf-daily', { date: today(), refreshCount: 0, chatCount: 0, variant: 0 }); if (state.date !== today()) return { date: today(), refreshCount: 0, chatCount: 0, variant: 0 }; return state; }
    function currentFortune() { const state = dailyState(); const idx = hash(`${instance}-${state.date}-${state.variant}`) % dailyFortunes.length; return { id: `${state.date}-${state.variant}`, date: state.date, text: dailyFortunes[idx][0], tone: dailyFortunes[idx][1], createdAt: Date.now() }; }
    function saveFortune(fortune) { const history = get('qf-history', []); if (!history.some(item => item.id === fortune.id)) set('qf-history', [fortune, ...history]); }
    function defaultAvatar() { return `https://picsum.photos/seed/quirky-${hash(instance)}/400/400`; }
    function profile() { return get('qf-profile', { name: 'User', photo: '' }); }
    function saveProfile(updates) { set('qf-profile', { ...profile(), ...updates }); renderProfile(); }
    function renderProfile() { const data = profile(); const name = (data.name || 'User').trim() || 'User'; $('#profileNameTitle').textContent = name; $('#profileNameInput').value = name; $('#avatar').src = data.photo || defaultAvatar(); }
    function render() { const fortune = currentFortune(); saveFortune(fortune); $('#greeting').textContent = greeting(); $('#modalGreeting').textContent = greeting(); $('#date').textContent = formatDate(fortune.date); $('#tone').textContent = fortune.tone; $('#fortune').textContent = fortune.text; $('#refresh').disabled = dailyState().refreshCount >= 2; $('#counter').textContent = `${Math.max(0, 3 - dailyState().chatCount)} ${Math.max(0, 3 - dailyState().chatCount) === 1 ? 'message' : 'messages'} left`; renderProfile(); const latest = get('qf-latest', ''); $('#latestWrap').style.display = latest ? 'block' : 'none'; $('#latestReply').textContent = latest; }
    function toast(msg) { $('#toast').textContent = msg; $('#toast').classList.add('show'); setTimeout(() => $('#toast').classList.remove('show'), 2200); }
    function openModal(id) { $('#' + id).classList.add('active'); render(); }
    function closeModal(id) { $('#' + id).classList.remove('active'); }
    function ask(question) { const q = question.trim(); if (!q) return; const state = dailyState(); if (state.chatCount >= 3) return toast('Daily limit reached. Come back tomorrow.'); const reply = followUps[hash(`${instance}-${q}-${state.chatCount}`) % followUps.length]; state.chatCount += 1; set('qf-daily', state); set('qf-latest', reply); $('#chatReply').textContent = reply; $('#question').value = ''; render(); }
    function renderPrompts() { $('#promptGrid').innerHTML = prompts.slice(0,2).map(p => `<button class="prompt" data-ask="${p.replaceAll('"','&quot;')}">${p}</button>`).join(''); $('#modalPrompts').innerHTML = prompts.slice(2,4).map(p => `<button class="prompt" data-ask="${p.replaceAll('"','&quot;')}">${p}</button>`).join(''); }
    function renderHistory() { const history = get('qf-history', []); $('#historyList').innerHTML = history.length ? history.map(item => `<div class="history-item"><strong>${formatHistoryDate(item.date)}</strong><div>${item.text}</div></div>`).join('') : '<p>Your fortunes will appear here.</p>'; }
    $('.tabs').addEventListener('click', e => { const tab = e.target.closest('.tab'); if (!tab) return; document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t === tab)); document.querySelectorAll('.screen').forEach(s => s.classList.toggle('active', s.id === tab.dataset.screen)); });
    document.addEventListener('click', e => { const askBtn = e.target.closest('[data-ask]'); if (askBtn) { openModal('chatModal'); ask(askBtn.dataset.ask); } const close = e.target.closest('[data-close]'); if (close) closeModal(close.dataset.close); });
    $('#openChat').onclick = () => openModal('chatModal');
    $('#historyBtn').onclick = () => { renderHistory(); openModal('historyModal'); };
    $('#profileNameInput').addEventListener('input', e => saveProfile({ name: e.target.value.trim() || 'User' }));
    $('#profilePhotoInput').addEventListener('change', e => {
      const file = e.target.files && e.target.files[0];
      if (!file) return;
      if (!file.type.startsWith('image/')) return toast('Please choose an image file.');
      const reader = new FileReader();
      reader.onload = () => { saveProfile({ photo: reader.result }); toast('Profile photo saved.'); };
      reader.onerror = () => toast('Could not read that image.');
      reader.readAsDataURL(file);
    });
    $('#resetProfilePhoto').onclick = () => { saveProfile({ photo: '' }); $('#profilePhotoInput').value = ''; toast('Profile photo reset.'); };

    $('#askBtn').onclick = () => ask($('#question').value);
    $('#question').addEventListener('keydown', e => { if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) ask($('#question').value); });
    $('#refresh').onclick = () => { const state = dailyState(); if (state.refreshCount >= 2) return toast('You used your extra fortunes for today.'); state.refreshCount += 1; state.variant += 1; set('qf-daily', state); render(); };
    $('#share').onclick = async () => { const fortune = currentFortune(); const text = `${fortune.text}\n\n— Quirky Fortune`; if (navigator.share) await navigator.share({ text }); else { await navigator.clipboard.writeText(text); toast('Copied fortune to clipboard.'); } };
    $('#download').onclick = () => { const fortune = currentFortune(); const canvas = document.createElement('canvas'); canvas.width = 1080; canvas.height = 1080; const ctx = canvas.getContext('2d'); const g = ctx.createLinearGradient(0,0,0,1080); g.addColorStop(0,'#5bb3ff'); g.addColorStop(.55,'#3a8fe8'); g.addColorStop(1,'#2b7fd4'); ctx.fillStyle = g; ctx.fillRect(0,0,1080,1080); ctx.fillStyle = '#fff'; ctx.font = '700 56px -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif'; ctx.textAlign = 'center'; ctx.fillText('✿ Quirky Fortune', 540, 180); roundRect(ctx, 120, 270, 840, 560, 72); ctx.fill(); ctx.fillStyle = '#8e8e93'; ctx.font = '42px -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif'; ctx.fillText(formatDate(fortune.date), 540, 360); ctx.fillStyle = '#1a1a1a'; ctx.font = '650 58px -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif'; wrap(ctx, fortune.text, 180, 480, 720, 76); ctx.fillStyle = 'rgba(255,255,255,.85)'; ctx.font = '600 36px -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif'; ctx.fillText('quirky-fortune.app', 540, 940); const link = document.createElement('a'); link.download = 'quirky-fortune.png'; link.href = canvas.toDataURL('image/png'); link.click(); };
    function roundRect(ctx, x, y, w, h, r) { ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
    function wrap(ctx, text, x, y, maxWidth, lineHeight) { const words = text.split(' '); let line = ''; for (const word of words) { const test = line + word + ' '; if (ctx.measureText(test).width > maxWidth && line) { ctx.fillText(line, x + maxWidth/2, y); line = word + ' '; y += lineHeight; } else line = test; } ctx.fillText(line, x + maxWidth/2, y); }
    if ('serviceWorker' in navigator) addEventListener('load', () => navigator.serviceWorker.register('./sw.js'));
    renderPrompts(); render();
  </script>
</body>
</html>

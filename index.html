<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Quirky Fortune</title>
  <meta name="description" content="A playful daily fortune app." />
  <meta name="theme-color" content="#3A8FE8" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="assets/favicon.png" />
  <link rel="apple-touch-icon" href="assets/icon.png" />
  <style>
    @property --sky-top    { syntax: '<color>'; inherits: true; initial-value: #5bb3ff; }
    @property --sky-bottom { syntax: '<color>'; inherits: true; initial-value: #3a8fe8; }
    @property --sky-deep   { syntax: '<color>'; inherits: true; initial-value: #2b7fd4; }
    :root {
      --sky-top: #5bb3ff;
      --sky-bottom: #3a8fe8;
      --sky-deep: #2b7fd4;
      --white: #fff;
      --text: #1a1a1a;
      --secondary: #8e8e93;
      --muted: #aeaeb2;
      --bubble: #f2f2f7;
      --glass: rgba(255,255,255,.22);
      --glass-active: rgba(255,255,255,.35);
      transition: --sky-top 1.1s ease, --sky-bottom 1.1s ease, --sky-deep 1.1s ease;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; font-family: Inter, ui-rounded, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: var(--text); }
    body {
      min-height: 100dvh;
      background: linear-gradient(180deg, var(--sky-top), var(--sky-bottom) 58%, var(--sky-deep));
      overflow-x: hidden;
    }
    body::before, body::after {
      content: ""; position: fixed; inset: auto; border-radius: 999px; background: rgba(255,255,255,.22); filter: blur(60px); pointer-events: none;
    }
    body::before { width: 340px; height: 340px; left: -100px; top: 10%; animation: blob1 15s ease-in-out infinite; }
    body::after  { width: 440px; height: 440px; right: -160px; bottom: 6%; animation: blob2 20s ease-in-out infinite; }
    .app { min-height: 100dvh; padding: max(20px, env(safe-area-inset-top)) 20px calc(112px + env(safe-area-inset-bottom)); max-width: 560px; margin: 0 auto; position: relative; }
    .header { display: flex; justify-content: center; align-items: center; gap: 12px; color: white; margin: 10px 0 34px; }
    .flower { width: 30px; height: 30px; position: relative; display: inline-block; }
    .flower span { position: absolute; width: 11px; height: 11px; border-radius: 50%; background: white; opacity: .95; }
    .flower span:nth-child(1) { left: 9px; top: 0; } .flower span:nth-child(2) { right: 0; top: 9px; } .flower span:nth-child(3) { left: 9px; bottom: 0; } .flower span:nth-child(4) { left: 0; top: 9px; } .flower span:nth-child(5) { left: 11px; top: 11px; width: 8px; height: 8px; }
    h1 { font-size: 26px; margin: 0; letter-spacing: -.02em; }
    .screen { display: none; } .screen.active { display: block; }
    .card { background: white; border-radius: 30px; padding: 24px; box-shadow: 0 24px 60px rgba(18, 76, 130, .22); }
    .row { display: flex; justify-content: space-between; align-items: center; gap: 14px; }
    .date { color: var(--secondary); font-size: 14px; }
    .pill { color: var(--secondary); background: var(--bubble); border-radius: 999px; padding: 6px 12px; font-size: 12px; font-weight: 700; }
    .fortune { font-size: 28px; line-height: 1.32; font-weight: 650; margin: 24px 0 28px; letter-spacing: -.03em; }
    .actions { display: flex; justify-content: space-between; align-items: center; }
    .action-group { display: flex; gap: 10px; }
    button { border: 0; font: inherit; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .icon-button { width: 44px; height: 44px; border-radius: 16px; background: var(--bubble); display: grid; place-items: center; font-size: 19px; }
    .icon-button:disabled { opacity: .45; cursor: default; }
    .profile { text-align: center; color: white; padding-top: 48px; }
    .avatar-ring { width: 124px; height: 124px; border-radius: 999px; border: 3px solid rgba(255,255,255,.55); padding: 4px; margin: 0 auto 18px; }
    .avatar { width: 100%; height: 100%; border-radius: inherit; object-fit: cover; background: rgba(255,255,255,.3); }
    .profile-tools { display: grid; gap: 12px; width: min(320px, 100%); margin: 0 auto 16px; }
    .profile-field { width: min(320px, 100%); border: 0; outline: 0; border-radius: 12px; padding: 6px 10px; font: inherit; font-size: 30px; font-weight: 700; color: white; background: transparent; text-align: center; display: block; margin: 0 auto 18px; -webkit-appearance: none; }
    .profile-field:focus { background: rgba(255,255,255,.15); }
    .profile-field::placeholder { color: rgba(255,255,255,.4); }
    .file-input { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0 0 0 0); clip-path: inset(50%); white-space: nowrap; }
    .profile-button-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .profile-button { height: 48px; border-radius: 16px; background: rgba(255,255,255,.25); color: white; font-weight: 750; display: grid; place-items: center; }
    .profile-note { margin: -4px 0 2px; color: rgba(255,255,255,.78); font-size: 12px; line-height: 1.35; }
    .history-button { min-width: 220px; height: 54px; border-radius: 18px; background: rgba(255,255,255,.25); color: white; font-weight: 750; display: flex; align-items: center; justify-content: center; gap: 8px; margin: 0 auto; }
    .icon-button svg, .tab svg, .history-button svg { display: block; }
    .tab svg { width: 20px; height: 20px; }
    .tabs { position: fixed; left: 50%; transform: translateX(-50%); bottom: max(24px, env(safe-area-inset-bottom)); width: min(360px, calc(100vw - 96px)); height: 64px; border-radius: 32px; background: var(--glass); display: flex; align-items: center; justify-content: space-around; z-index: 10; backdrop-filter: blur(18px); }
    .tab { color: white; background: transparent; border-radius: 24px; padding: 9px 18px; min-width: 92px; font-size: 12px; font-weight: 700; display: grid; gap: 2px; justify-items: center; }
    .tab.active { background: var(--glass-active); }
    .modal { position: fixed; inset: 0; background: linear-gradient(180deg, var(--sky-top), var(--sky-bottom) 58%, var(--sky-deep)); padding: max(22px, env(safe-area-inset-top)) 20px max(22px, env(safe-area-inset-bottom)); z-index: 20; display: none; overflow: auto; }
    .modal.active { display: block; }
    .modal-inner { max-width: 560px; margin: 0 auto; min-height: 100%; display: flex; flex-direction: column; justify-content: flex-end; }
    .sheet { background: white; border-radius: 30px 30px 0 0; padding: 12px 20px 22px; max-height: 78dvh; overflow: auto; }
    .handle { width: 44px; height: 5px; border-radius: 999px; background: #d1d1d6; margin: 0 auto 18px; }
    .sheet h2 { margin: 0 0 18px; }
    .history-item { padding: 15px 0; border-bottom: 1px solid #eee; }
    .history-item strong { display: block; color: var(--secondary); font-size: 13px; margin-bottom: 5px; }
    .close { width: 100%; border-radius: 18px; height: 52px; margin-top: 16px; font-weight: 750; background: var(--bubble); color: var(--text); }
    .toast { position: fixed; left: 20px; right: 20px; bottom: 104px; max-width: 520px; margin: auto; border-radius: 18px; background: rgba(26,26,26,.88); color: white; padding: 14px 16px; text-align: center; opacity: 0; pointer-events: none; transform: translateY(12px); transition: .25s ease; z-index: 40; }
    .toast.show { opacity: 1; transform: translateY(0); }
    @media (max-width: 420px) { .app { padding-left: 16px; padding-right: 16px; } .fortune { font-size: 24px; } .tabs { width: min(320px, calc(100vw - 56px)); } }
    :root.theme-Earnest { --sky-top: #a78bfa; --sky-bottom: #7c3aed; --sky-deep: #5b21b6; }
    :root.theme-Playful { --sky-top: #fb7185; --sky-bottom: #e11d48; --sky-deep: #9f1239; }
    :root.theme-Mixed   { --sky-top: #34d399; --sky-bottom: #059669; --sky-deep: #065f46; }
    @keyframes blob1 { 0%,100% { transform: translate(0,0) scale(1); } 33% { transform: translate(48px,-38px) scale(1.18); } 66% { transform: translate(-28px,24px) scale(.88); } }
    @keyframes blob2 { 0%,100% { transform: translate(0,0) scale(1); } 40% { transform: translate(-58px,42px) scale(.83); } 70% { transform: translate(38px,-52px) scale(1.22); } }
    @keyframes blob3 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(38px,48px); } }
    @keyframes blob4 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(-42px,-38px); } }
    @keyframes fortune-in { from { transform: translateY(16px); } to { transform: translateY(0); } }
    .blob-extra { position: fixed; border-radius: 999px; background: rgba(255,255,255,.16); filter: blur(75px); pointer-events: none; }
    .blob-a { width: 270px; height: 270px; top: 40%; left: 22%; animation: blob3 24s ease-in-out infinite; }
    .blob-b { width: 200px; height: 200px; top: 16%; right: 16%; animation: blob4 17s ease-in-out infinite; }
    .fortune-animate { animation: fortune-in .45s cubic-bezier(.22,.61,.36,1); }
  </style>
</head>
<body>
  <div class="blob-extra blob-a" aria-hidden="true"></div>
  <div class="blob-extra blob-b" aria-hidden="true"></div>
  <main class="app">
    <section id="home" class="screen active">
      <div class="header"><span class="flower"><span></span><span></span><span></span><span></span><span></span></span><h1 id="greeting">Good morning</h1></div>
      <article class="card">
        <div class="row"><span id="date" class="date"></span><span id="tone" class="pill"></span></div>
        <div id="fortune" class="fortune">Reading the stars…</div>
        <div class="actions">
          <div class="action-group">
            <button class="icon-button" id="refresh" aria-label="Refresh fortune"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg></button>
            <button class="icon-button" id="share" aria-label="Share fortune"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg></button>
          </div>
          <button class="icon-button" id="download" aria-label="Download image"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg></button>
        </div>
      </article>
    </section>
    <section id="profile" class="screen">
      <div class="profile">
        <div class="avatar-ring"><img id="avatar" class="avatar" alt="Profile avatar"></div>
        <input id="profileNameInput" class="profile-field" type="text" maxlength="32" placeholder="Your name" autocomplete="name">
        <div class="profile-tools" aria-label="Profile settings">
          <div class="profile-button-row">
            <label class="profile-button" for="profilePhotoInput">Change photo</label>
            <button class="profile-button" id="resetProfilePhoto" type="button">Reset photo</button>
          </div>
          <input id="profilePhotoInput" class="file-input" type="file" accept="image/*">
          <p class="profile-note">Your name and picture are saved only on this device.</p>
        </div>
        <button class="history-button" id="historyBtn"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg><span>History</span></button>
      </div>
    </section>
  </main>
  <nav class="tabs" aria-label="Main navigation"><button class="tab active" data-screen="home"><span><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg></span><span>Home</span></button><button class="tab" data-screen="profile"><span><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg></span><span>Profile</span></button></nav>
  <section id="historyModal" class="modal"><div class="modal-inner"><div class="sheet"><div class="handle"></div><h2>Fortune History</h2><div id="historyList"></div><button class="close" data-close="historyModal">Close</button></div></div></section>
  <div id="toast" class="toast"></div>
  <script>
    const dailyFortunes = [
      ['You\'re going to be fine. Not in a vague, fortune-cookie way — actually fine. Something is quietly working itself out.', 'Earnest'],
      ['Mercury is in retrograde, but honestly Mercury is always in retrograde and your Wi-Fi was slow before that too.', 'Playful'],
      ['The thing you think is too small to matter is probably the thing that matters.', 'Earnest'],
      ['Today is a good day to misplace something minor and spend forty-five minutes looking for it, thereby accidentally reorganising your entire room.', 'Playful'],
      ['You already know what you should do. You\'re just hoping someone else will decide first.', 'Earnest'],
      ['Not everything needs a sign. Sometimes a bird is just a bird. A very meaningful bird — but still a bird.', 'Mixed'],
      ['The stars have nothing to say today. They\'re just there, being stars. That\'s enough. You\'re allowed to just be there too.', 'Earnest'],
      ['A decision you\'ve been agonising over will resolve itself soon. The thing you weren\'t worried about will take months.', 'Mixed'],
      ['Do the awkward thing. Send the message. The other person is also nervous.', 'Earnest'],
      ['You are carrying something that wasn\'t yours to carry. You can put it down. It\'ll still be there if you want it back — but you really don\'t have to.', 'Earnest'],
      ['The universe does not have a plan for you, but you do, and yours is probably more realistic anyway.', 'Playful'],
      ['Today you will say something slightly wrong in front of people, and nobody will care, and you will think about it for six years.', 'Playful'],
      ['Your browser tabs are a spiritual document. They reveal everything.', 'Playful'],
      ['Rest is not something you earn. It\'s something you take.', 'Earnest'],
      ['You\'re allowed to want something different than what you wanted last year. That\'s not inconsistency. That\'s just you, updating.', 'Earnest']
    ];
    const $ = s => document.querySelector(s);
    const today = () => new Date().toISOString().slice(0,10);
    const hash = value => Math.abs([...value].reduce((h, ch) => ((h << 5) - h + ch.charCodeAt(0)) | 0, 0));
    const get = (key, fallback) => JSON.parse(localStorage.getItem(key) || JSON.stringify(fallback));
    const set = (key, value) => localStorage.setItem(key, JSON.stringify(value));
    let instance = localStorage.getItem('qf-instance');
    if (!instance) { instance = Date.now().toString(36) + '-' + Math.random().toString(36).slice(2,10); localStorage.setItem('qf-instance', instance); }
    function greeting() { const h = new Date().getHours(); return h < 12 ? 'Good morning' : h < 17 ? 'Good afternoon' : h < 21 ? 'Good evening' : 'Good night'; }
    function formatDate(key) { const [y,m,d] = key.split('-').map(Number); return new Date(y, m - 1, d).toLocaleDateString('en-GB', { day: 'numeric', month: 'long' }); }
    function formatHistoryDate(key) { const [y,m,d] = key.split('-').map(Number); return new Date(y, m - 1, d).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }); }
    function dailyState() { const state = get('qf-daily', { date: today(), refreshCount: 0, variant: 0 }); if (state.date !== today()) return { date: today(), refreshCount: 0, variant: 0 }; return state; }
    function currentFortune() { const state = dailyState(); const idx = hash(`${instance}-${state.date}-${state.variant}`) % dailyFortunes.length; return { id: `${state.date}-${state.variant}`, date: state.date, text: dailyFortunes[idx][0], tone: dailyFortunes[idx][1], createdAt: Date.now() }; }
    function saveFortune(fortune) { const history = get('qf-history', []); if (!history.some(item => item.id === fortune.id)) set('qf-history', [fortune, ...history]); }
    function defaultAvatar() { return `https://picsum.photos/seed/quirky-${hash(instance)}/400/400`; }
    function profile() { return get('qf-profile', { name: 'User', photo: '' }); }
    function saveProfile(updates) { set('qf-profile', { ...profile(), ...updates }); renderProfile(); }
    function renderProfile() { const data = profile(); const name = (data.name || 'User').trim() || 'User'; $('#profileNameInput').value = name; $('#avatar').src = data.photo || defaultAvatar(); }
    function applyTheme(tone) { const r = document.documentElement; r.classList.remove('theme-Earnest','theme-Playful','theme-Mixed'); if (tone) r.classList.add('theme-' + tone); }
    function animateFortune() { const el = $('#fortune'); el.classList.remove('fortune-animate'); void el.offsetWidth; el.classList.add('fortune-animate'); }
    function render() { const fortune = currentFortune(); saveFortune(fortune); $('#greeting').textContent = greeting(); $('#date').textContent = formatDate(fortune.date); $('#tone').textContent = fortune.tone; $('#fortune').textContent = fortune.text; applyTheme(fortune.tone); animateFortune(); $('#refresh').disabled = dailyState().refreshCount >= 2; renderProfile(); }
    function toast(msg) { $('#toast').textContent = msg; $('#toast').classList.add('show'); setTimeout(() => $('#toast').classList.remove('show'), 2200); }
    function openModal(id) { $('#' + id).classList.add('active'); render(); }
    function closeModal(id) { $('#' + id).classList.remove('active'); }
    function renderHistory() { const history = get('qf-history', []); $('#historyList').innerHTML = history.length ? history.map(item => `<div class="history-item"><strong>${formatHistoryDate(item.date)}</strong><div>${item.text}</div></div>`).join('') : '<p>Your fortunes will appear here.</p>'; }
    $('.tabs').addEventListener('click', e => { const tab = e.target.closest('.tab'); if (!tab) return; document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t === tab)); document.querySelectorAll('.screen').forEach(s => s.classList.toggle('active', s.id === tab.dataset.screen)); });
    document.addEventListener('click', e => { const close = e.target.closest('[data-close]'); if (close) closeModal(close.dataset.close); });
    $('#historyBtn').onclick = () => { renderHistory(); openModal('historyModal'); };
    $('#profileNameInput').addEventListener('input', e => saveProfile({ name: e.target.value.trim() || 'User' }));
    $('#profilePhotoInput').addEventListener('change', e => {
      const file = e.target.files && e.target.files[0];
      if (!file) return;
      if (!file.type.startsWith('image/')) return toast('Please choose an image file.');
      const reader = new FileReader();
      reader.onload = () => { saveProfile({ photo: reader.result }); toast('Profile photo saved.'); };
      reader.onerror = () => toast('Could not read that image.');
      reader.readAsDataURL(file);
    });
    $('#resetProfilePhoto').onclick = () => { saveProfile({ photo: '' }); $('#profilePhotoInput').value = ''; toast('Profile photo reset.'); };
    $('#refresh').onclick = () => { const state = dailyState(); if (state.refreshCount >= 2) return toast('You used your extra fortunes for today.'); state.refreshCount += 1; state.variant += 1; set('qf-daily', state); render(); };
    $('#share').onclick = async () => { const fortune = currentFortune(); const text = `${fortune.text}\n\n— Quirky Fortune`; if (navigator.share) await navigator.share({ text }); else { await navigator.clipboard.writeText(text); toast('Copied fortune to clipboard.'); } };
    $('#download').onclick = () => {
      const fortune = currentFortune();
      const cs = getComputedStyle(document.documentElement);
      const colTop    = cs.getPropertyValue('--sky-top').trim()    || '#5bb3ff';
      const colBottom = cs.getPropertyValue('--sky-bottom').trim() || '#3a8fe8';
      const colDeep   = cs.getPropertyValue('--sky-deep').trim()   || '#2b7fd4';
      const canvas = document.createElement('canvas');
      canvas.width = 1080; canvas.height = 1080;
      const ctx = canvas.getContext('2d');
      ctx.textAlign = 'center';
      const g = ctx.createLinearGradient(0,0,0,1080);
      g.addColorStop(0, colTop); g.addColorStop(.55, colBottom); g.addColorStop(1, colDeep);
      ctx.fillStyle = g; ctx.fillRect(0,0,1080,1080);
      ctx.fillStyle = 'rgba(255,255,255,.92)';
      ctx.font = '700 52px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
      ctx.fillText('✿ Quirky Fortune', 540, 150);
      const cx = 70, cy = 192, cw = 940, ch = 726;
      roundRect(ctx, cx, cy, cw, ch, 72); ctx.fillStyle = '#fff'; ctx.fill();
      ctx.fillStyle = '#8e8e93';
      ctx.font = '500 36px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
      ctx.fillText(formatDate(fortune.date), 540, 282);
      const padX = 80, textW = cw - padX * 2;
      const yTop = cy + 118, yBottom = cy + ch - 100;
      let size = 58, lines = [];
      while (size >= 30) {
        ctx.font = `650 ${size}px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif`;
        lines = wrapLines(ctx, fortune.text, textW);
        if (yTop + lines.length * size * 1.38 <= yBottom) break;
        size -= 3;
      }
      const lineH = size * 1.38;
      const blockH = lines.length * lineH;
      const yStart = yTop + (yBottom - yTop - blockH) / 2 + size * 0.8;
      ctx.fillStyle = '#1a1a1a';
      lines.forEach((ln, i) => ctx.fillText(ln.trim(), 540, yStart + i * lineH));
      drawFortuneCookieIcon(ctx, 540, cy + ch - 52, 30);
      const link = document.createElement('a');
      link.download = 'quirky-fortune.png'; link.href = canvas.toDataURL('image/png'); link.click();
    };
    function roundRect(ctx, x, y, w, h, r) { ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
